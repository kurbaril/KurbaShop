    // Helper functions
    function getCategoryName(cat) {
        return translations[currentLang].categories[cat] || cat;
    }
    
    function getSubcategoryName(sub) {
        return translations[currentLang].subcategories[sub] || sub;
    }
    
    function getTranslation(key) {
        return translations[currentLang][key] || key;
    }
    
    function updateProductNames() {
        products.forEach(p => {
            const langKey = currentLang;
            if (langKey === 'en') {
                p.name = p.nameEn;
                p.shortDesc = p.shortDescEn;
                p.fullDesc = p.fullDescEn;
            } else if (langKey === 'ru') {
                p.name = p.nameRu || p.nameEn;
                p.shortDesc = p.shortDescRu || p.shortDescEn;
                p.fullDesc = p.fullDescRu || p.fullDescEn;
            } else if (langKey === 'es') {
                p.name = p.nameEs || p.nameEn;
                p.shortDesc = p.shortDescEs || p.shortDescEn;
                p.fullDesc = p.fullDescEs || p.fullDescEn;
            } else if (langKey === 'de') {
                p.name = p.nameDe || p.nameEn;
                p.shortDesc = p.shortDescDe || p.shortDescEn;
                p.fullDesc = p.fullDescDe || p.fullDescEn;
            } else if (langKey === 'fr') {
                p.name = p.nameFr || p.nameEn;
                p.shortDesc = p.shortDescFr || p.shortDescEn;
                p.fullDesc = p.fullDescFr || p.fullDescEn;
            }
        });
    }
    
    function sortProducts() {
        if (currentSort === 'name-asc') {
            products.sort((a, b) => a.name.localeCompare(b.name));
        } else if (currentSort === 'name-desc') {
            products.sort((a, b) => b.name.localeCompare(a.name));
        } else if (currentSort === 'price-asc') {
            products.sort((a, b) => a.marketPrice - b.marketPrice);
        } else if (currentSort === 'price-desc') {
            products.sort((a, b) => b.marketPrice - a.marketPrice);
        }
    }
    
    // Cart functions
    function saveCart() {
        localStorage.setItem('kurbashop_cart', JSON.stringify(cart));
        updateCartUI();
    }
    
    function updateCartUI() {
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cartCount').innerText = count;
        
        const total = cart.reduce((sum, item) => sum + (item.price * (1 - DISCOUNT) * item.quantity), 0);
        document.getElementById('cartTotal').innerHTML = formatPrice(total);
        document.getElementById('cartTotalLabel').innerHTML = getTranslation('total');
        
        const container = document.getElementById('cartItemsList');
        if (cart.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:40px;">${getTranslation('emptyCart')}</div>`;
            return;
        }
        
        container.innerHTML = cart.map(item => {
            const discountPrice = item.price * (1 - DISCOUNT);
            return `
                <div class="cart-item">
                    <img class="cart-item-img" src="${item.img}" onerror="this.src='https://placehold.co/60x60/2a2e3a/b8c7a3?text=img'">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${escapeHtml(item.name)}</div>
                        <div class="cart-item-price">${formatPrice(discountPrice)}</div>
                        <div class="cart-item-quantity">
                            <button onclick="updateCartItem(${item.id}, ${item.quantity - 1})">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateCartItem(${item.id}, ${item.quantity + 1})">+</button>
                        </div>
                    </div>
                    <button class="cart-item-remove" onclick="removeCartItem(${item.id})">🗑️</button>
                </div>
            `;
        }).join('');
    }
    
    function updateCartItem(id, newQuantity) {
        if (newQuantity <= 0) {
            removeCartItem(id);
            return;
        }
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity = newQuantity;
            saveCart();
        }
    }
    
    function removeCartItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
    }
    
    function addToCart(product) {
        const existing = cart.find(i => i.id === product.id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.marketPrice,
                img: product.images[0],
                quantity: 1
            });
        }
        saveCart();
        alert(getTranslation('addToCart') + ": " + product.name);
    }
    
    function sendCartToTelegram() {
        if (cart.length === 0) {
            alert(getTranslation('emptyCart'));
            return;
        }
        
        const total = cart.reduce((sum, item) => sum + (item.price * (1 - DISCOUNT) * item.quantity), 0);
        let message = "🛒 *NEW ORDER*\n\n";
        
        cart.forEach(item => {
            const discountPrice = item.price * (1 - DISCOUNT);
            message += `• ${item.name} x${item.quantity} = ${formatPrice(discountPrice * item.quantity)}\n`;
        });
        
        message += `\n📦 *TOTAL: ${formatPrice(total)}* (20% discount)`;
        message += `\n\n👤 Customer: via website`;
        
        const tgLink = `https://t.me/${TG_USERNAME}?text=${encodeURIComponent(message)}`;
        window.open(tgLink, '_blank');
    }
    
    function getProductById(id) {
        return products.find(p => p.id === id);
    }
    
    // UI Functions
    function updateUIForLanguage() {
        const t = translations[currentLang];
        
        document.getElementById('logoSub').innerHTML = t.logoSub;
        document.getElementById('discountBanner').innerHTML = `${t.discountBanner} <span>${t.discountSpan}</span>`;
        document.getElementById('footerText').innerHTML = t.footer;
        document.getElementById('cartOrderBtn').innerHTML = `<i class="fab fa-telegram"></i> ${t.sendOrder}`;
        document.getElementById('cartTitle').innerHTML = `<i class="fas fa-shopping-cart"></i> ${t.cartTitle}`;
        document.getElementById('cartBtnText').innerHTML = t.cartBtnText;
        document.getElementById('modalAddToCart').innerHTML = `<i class="fas fa-cart-plus"></i> ${t.addToCart}`;
        document.getElementById('modalOrderNow').innerHTML = `<i class="fab fa-telegram"></i> ${t.buyNow}`;
        document.getElementById('modalBackBtn').innerHTML = `<i class="fas fa-arrow-left"></i> ${t.back}`;
        
        const langNames = { en: 'EN', ru: 'RU', es: 'ES', de: 'DE', fr: 'FR' };
        document.getElementById('currentLangText').innerHTML = langNames[currentLang];
        
        const sortSelect = document.getElementById('sortSelect');
        sortSelect.options[0].text = t.sort.nameAsc;
        sortSelect.options[1].text = t.sort.nameDesc;
        sortSelect.options[2].text = t.sort.priceAsc;
        sortSelect.options[3].text = t.sort.priceDesc;
        
        updateProductNames();
        sortProducts();
        renderCategories();
        updateSubcategories();
        renderProducts();
        updateCartUI();
    }
    
    function renderCategories() {
        const container = document.getElementById('categoriesList');
        if (!container) return;
        
        const categoriesArray = Array.from(categoriesSet);
        container.innerHTML = categoriesArray.map(cat => `
            <button class="cat-btn ${activeCategory === cat ? 'active' : ''}" data-cat="${cat}">
                ${getCategoryName(cat)}
            </button>
        `).join('');
        
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                activeCategory = btn.getAttribute('data-cat');
                activeSubcategory = null;
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateSubcategories();
                renderProducts();
            });
        });
    }
    
    function updateSubcategories() {
        const subs = Array.from(subcategoriesMap.get(activeCategory) || []);
        const container = document.getElementById('subcatsList');
        if (!container) return;
        
        container.innerHTML = '';
        
        const allBtn = document.createElement('button');
        allBtn.textContent = getTranslation('all');
        allBtn.className = `sub-btn ${!activeSubcategory ? 'active' : ''}`;
        allBtn.onclick = () => {
            activeSubcategory = null;
            renderProducts();
            highlightSubcategory(null);
        };
        container.appendChild(allBtn);
        
        subs.forEach(sub => {
            const btn = document.createElement('button');
            btn.textContent = getSubcategoryName(sub);
            btn.className = `sub-btn ${activeSubcategory === sub ? 'active' : ''}`;
            btn.onclick = () => {
                activeSubcategory = sub;
                renderProducts();
                highlightSubcategory(sub);
            };
            container.appendChild(btn);
        });
    }
    
    function highlightSubcategory(selected) {
        const btns = document.querySelectorAll('#subcatsList .sub-btn');
        btns.forEach(btn => {
            if (btn.textContent === (selected ? getSubcategoryName(selected) : getTranslation('all'))) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        
        let filtered = products.filter(p => p.category === activeCategory);
        if (activeSubcategory) {
            filtered = filtered.filter(p => p.subcategory === activeSubcategory);
        }
        
        if (filtered.length === 0) {
            const noItemsText = currentLang === 'en' ? 'No items in this category' : 
                               currentLang === 'ru' ? 'Нет товаров в выбранной категории' : 
                               'No hay artículos';
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px;">${noItemsText}</div>`;
            return;
        }
        
        grid.innerHTML = filtered.map(product => {
            const discountPrice = product.marketPrice * (1 - DISCOUNT);
            return `
                <div class="product-card" data-id="${product.id}">
                    <img class="product-img" src="${product.images[0]}" alt="${escapeHtml(product.name)}" 
                         onerror="this.src='https://placehold.co/600x400/2a2e3a/b8c7a3?text=${encodeURIComponent(product.name)}'">
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(product.name)}</div>
                        <div class="product-price">
                            <span class="old-price">${formatPrice(product.marketPrice)}</span>
                            <span class="new-price">${formatPrice(discountPrice)}</span>
                            <span class="discount-badge">-20%</span>
                        </div>
                        <div class="product-desc">${escapeHtml(product.shortDesc)}</div>
                        <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(getProductById(${product.id}))">
                            <i class="fas fa-cart-plus"></i> ${getTranslation('addToCart')}
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.product-card').forEach(card => {
            const id = parseInt(card.getAttribute('data-id'));
            card.addEventListener('click', () => openProductModal(id));
        });
    }
    
    function openProductModal(productId) {
        const product = getProductById(productId);
        if (!product) return;
        
        const discountPrice = product.marketPrice * (1 - DISCOUNT);
        
        document.getElementById('modalMainImage').src = product.images[0];
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalDescription').innerHTML = product.fullDesc;
        document.getElementById('modalOldPrice').innerText = formatPrice(product.marketPrice);
        document.getElementById('modalNewPrice').innerText = formatPrice(discountPrice);
        
        const thumbContainer = document.getElementById('thumbnailsContainer');
        thumbContainer.innerHTML = '';
        
        product.images.forEach((img, idx) => {
            const thumb = document.createElement('img');
            thumb.src = img;
            thumb.classList.add('thumbnail');
            if (idx === 0) thumb.classList.add('active');
            thumb.onerror = () => {
                thumb.src = 'https://placehold.co/70x70/2a2e3a/b8c7a3?text=img';
            };
            thumb.onclick = () => {
                document.getElementById('modalMainImage').src = img;
                document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
            };
            thumbContainer.appendChild(thumb);
        });
        
        document.getElementById('modalAddToCart').onclick = () => {
            addToCart(product);
            document.getElementById('productModal').classList.remove('active');
        };
        
        document.getElementById('modalOrderNow').onclick = () => {
            addToCart(product);
            document.getElementById('cartModal').classList.add('active');
            document.getElementById('productModal').classList.remove('active');
        };
        
        document.getElementById('modalBackBtn').onclick = () => {
            document.getElementById('productModal').classList.remove('active');
        };
        
        document.getElementById('productModal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('productModal').classList.remove('active');
    }
    
    function closeCart() {
        document.getElementById('cartModal').classList.remove('active');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Event Listeners
    document.getElementById('langBtn').addEventListener('click', () => {
        document.getElementById('langDropdown').classList.toggle('active');
    });
    
    document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', () => {
            currentLang = opt.getAttribute('data-lang');
            localStorage.setItem('kurbashop_lang', currentLang);
            updateUIForLanguage();
            document.getElementById('langDropdown').classList.remove('active');
        });
    });
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.lang-selector')) {
            document.getElementById('langDropdown').classList.remove('active');
        }
    });
    
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('productModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('productModal')) closeModal();
    });
    
    document.getElementById('cartBtn').addEventListener('click', () => {
        document.getElementById('cartModal').classList.add('active');
    });
    
    document.getElementById('closeCartBtn').addEventListener('click', closeCart);
    document.getElementById('cartModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('cartModal')) closeCart();
    });
    
    document.getElementById('cartOrderBtn').addEventListener('click', sendCartToTelegram);
    
    document.getElementById('sortSelect').addEventListener('change', (e) => {
        currentSort = e.target.value;
        sortProducts();
        renderProducts();
    });
    
    // Make functions global for onclick
    window.updateCartItem = updateCartItem;
    window.removeCartItem = removeCartItem;
    window.addToCart = addToCart;
    window.getProductById = getProductById;
    
    // Initialize
    updateUIForLanguage();
