        document.getElementById("modalAddToCart").onclick=()=>{addToCart(p); document.getElementById("productModal").classList.remove('active');};
        document.getElementById("modalOrderNow").onclick=()=>{addToCart(p); document.getElementById("cartModal").classList.add('active'); document.getElementById("productModal").classList.remove('active');};
        document.getElementById("modalBackBtn").onclick=()=>document.getElementById("productModal").classList.remove('active');
        document.getElementById("productModal").classList.add('active');
    }
    function closeModal(){ document.getElementById("productModal").classList.remove('active'); }
    function closeCart(){ document.getElementById("cartModal").classList.remove('active'); }
    function renderCategories() {
        const cont=document.getElementById("categoriesList"); if(!cont) return;
        cont.innerHTML=Array.from(categoriesSet).map(c=>`<button class="cat-btn ${activeCategory===c?'active':''}" data-cat="${c}">${getCategoryName(c)}</button>`).join('');
        document.querySelectorAll('.cat-btn').forEach(btn=>{btn.addEventListener('click',()=>{activeCategory=btn.getAttribute('data-cat'); activeSubcategory=null; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); updateSubcategories(); renderProducts();});});
    }
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    // Event Listeners
    document.getElementById('langBtn').addEventListener('click',()=>document.getElementById('langDropdown').classList.toggle('active'));
    document.querySelectorAll('.lang-option').forEach(opt=>{opt.addEventListener('click',()=>{currentLang=opt.getAttribute('data-lang'); localStorage.setItem('kurbashop_lang',currentLang); updateUIForLanguage(); document.getElementById('langDropdown').classList.remove('active');});});
    document.addEventListener('click',e=>{if(!e.target.closest('.lang-selector')) document.getElementById('langDropdown').classList.remove('active');});
    document.getElementById('closeModalBtn').addEventListener('click',closeModal);
    document.getElementById('productModal').addEventListener('click',e=>{if(e.target===document.getElementById('productModal'))closeModal();});
    document.getElementById('cartBtn').addEventListener('click',()=>document.getElementById('cartModal').classList.add('active'));
    document.getElementById('closeCartBtn').addEventListener('click',closeCart);
    document.getElementById('cartModal').addEventListener('click',e=>{if(e.target===document.getElementById('cartModal'))closeCart();});
    document.getElementById('cartOrderBtn').addEventListener('click',sendCartToTelegram);
    document.getElementById('sortSelect').addEventListener('change',(e)=>{currentSort=e.target.value; sortProducts(); renderProducts();});
    
    window.updateCartItem=updateCartItem; window.removeCartItem=removeCartItem; window.addToCart=addToCart; window.getProductById=getProductById;
    updateUIForLanguage();
</script>
</body>
</html>
